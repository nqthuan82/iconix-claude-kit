# ICONIX project configuration
# Each project drops this file at its root to parameterize the agent kit.

project:
  name: "YourProject"
  prefix: "PRJ"           # ID prefix, e.g., RGS-UC-017

stack:
  language: "csharp"       # csharp | java | python | typescript | go
  test_framework: "xunit"  # xunit | nunit | junit | pytest | jest
  bdd: true
  bdd_framework: "specflow" # specflow | cucumber | behave

diagrams:
  format: "plantuml"       # plantuml | mermaid
  output_dir: "docs/iconix"

architecture:
  canonical_doc: "docs/architecture/system-architecture.md"
  containers:
    # List the named containers in your architecture.
    # The Architect agent will map UCs to these.
    - name: "Backend"
    - name: "WebAPI"
    - name: "Frontend"
    - name: "Database"

nfr_catalog: "docs/nfr-catalog.md"

# Custom test families for your domain (e.g., gaming, finance, healthcare)
domain_test_families:
  # - "regulatory-audit"
  # - "transaction-idempotency"

milestones:
  require_traceability_pass: true
  require_rule_validation: true
  max_revisions_per_artifact: 3   # anti-analysis-paralysis guardrail

# Knowledge graph integration (optional, used by iconix-migration in v0.3.0+)
# Enable when you have Graphify installed and have run `graphify .` on your repo.
# See docs/iconix/templates/graphify-setup.md for setup.
knowledge_graph:
  enabled: false                       # set to true after running graphify
  tool: "graphify"                     # only graphify is supported in v0.3.0
  graph_path: "graphify-out/graph.json"
  report_path: "graphify-out/GRAPH_REPORT.md"
  mcp_server: true                     # use MCP server for live queries
  min_confidence: 0.7                  # threshold for INFERRED edges
  max_age_warn_days: 7                 # warn if graph older than this
  max_age_fail_days: 30                # refuse to proceed if older than this
